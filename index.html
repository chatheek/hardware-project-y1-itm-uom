<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dealer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #22d3ee; --bg: #0f172a; --card: rgba(30, 41, 59, 0.75); --text: #f8fafc; --danger: #ef4444; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .glass-card { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; padding: 2.5rem; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; }
        h1 { font-size: 2rem; font-weight: 800; margin: 0 0 0.5rem 0; background: linear-gradient(to right, #818cf8, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid #334155; background: rgba(15, 23, 42, 0.6); color: white; text-align: center; font-size: 1.8rem; letter-spacing: 10px; font-weight: 800; outline: none; margin-bottom: 1.5rem; }
        .preview-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; margin-bottom: 1.5rem; text-align: left; border-left: 4px solid var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
        .chip { padding: 12px; border-radius: 14px; background: #1e293b; border: 2px solid transparent; cursor: pointer; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .chip.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.2); color: var(--accent); }
        .stepper { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 12px 20px; border-radius: 18px; margin-bottom: 1.5rem; }
        .step-btn { width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--primary); color: white; font-size: 1.5rem; cursor: pointer; }
        .step-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .trump-wrap { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.5rem; }
        .t-btn { padding: 12px; font-size: 0.9rem; border-radius: 12px; border: 2px solid #334155; background: #0f172a; cursor: pointer; color: white; }
        .t-btn.active { border-color: var(--accent); background: rgba(34, 211, 238, 0.1); }
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }
        .btn-outline { background: transparent; border: 1px solid #334155; margin-top: 10px; font-size: 0.8rem; padding: 10px; color: #94a3b8; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); margin-top: 2rem; font-size: 0.8rem; }
        .hidden { display: none; }
        .label { display: block; text-align: left; font-size: 0.75rem; color: #64748b; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>Nexus Dealer</h1>
    
    <div id="loginSection">
        <p class="subtitle">Enter hardware pin to connect</p>
        <input type="text" id="pinInput" placeholder="00000000" maxlength="8">
        <button class="btn" onclick="connectDevice()">Connect to System</button>
    </div>

    <div id="dashSection" class="hidden">
        <div class="preview-box">
            <span class="label">Current Selection</span>
            <div id="liveStatus" style="font-weight: 600;">Pick a game...</div>
        </div>

        <span class="label">Games</span>
        <div class="grid">
            <div class="chip" onclick="selectGame('Bridge', 4, true)">♠️ Bridge</div>
            <div class="chip" onclick="selectGame('Spades', 4, true)">♣️ Spades</div>
            <div class="chip" onclick="selectGame('Hearts', 4, true)">♥️ Hearts</div>
            <div class="chip" onclick="selectGame('Omi', 4, true)">♦️ Omi</div>
            <div class="chip" onclick="selectGame('Go Fish', 2, false, 2, 4)">🎣 Go Fish</div>
            <div class="chip" onclick="selectGame('Rummy', 2, false, 2, 6)">🃏 Rummy</div>
            <div class="chip" onclick="selectGame('Solitaire', 1, true)">👤 Solitaire</div>
        </div>

        <span class="label">Players</span>
        <div class="stepper">
            <button class="step-btn" id="mBtn" onclick="updatePlayers(-1)">−</button>
            <span id="playerVal" style="font-size: 1.5rem; font-weight: 800;">4</span>
            <button class="step-btn" id="pBtn" onclick="updatePlayers(1)">+</button>
        </div>

        <div id="omiTrumpBox" class="hidden">
            <span class="label">Choose Trump Card</span>
            <div class="trump-wrap">
                <button class="t-btn" onclick="setTrump('Spades', this)">Spades</button>
                <button class="t-btn" onclick="setTrump('Hearts', this)">Hearts</button>
                <button class="t-btn" onclick="setTrump('Clubs', this)">Clubs</button>
                <button class="t-btn" onclick="setTrump('Diamonds', this)">Diamonds</button>
            </div>
        </div>

        <button class="btn" id="launchBtn" onclick="launchGame()">Start Dealing</button>
        
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="btn btn-outline" onclick="resetSelection()">🔄 Reset Current Selection</button>
            <button class="btn btn-danger" onclick="disconnectWiFi()">⚠️ Disconnect & Wipe WiFi</button>
        </div>
    </div>
</div>

<script>
    let deviceIP = "";
    let gameConfig = { name: "", players: 4, isLocked: true, min: 2, max: 4, trump: "" };

    async function connectDevice() {
        const pin = document.getElementById('pinInput').value;
        try {
            const res = await fetch(`/api/lookup?code=${pin}`);
            const data = await res.json();
            deviceIP = data.ip;
            const test = await fetch(`http://${deviceIP}/check_pin?pin=${pin}`);
            if(test.ok) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden');
            }
        } catch(e) { alert("Hardware Connection Failed"); }
    }

    function selectGame(name, p, locked, min=2, max=6) {
        gameConfig = { name, players: p, isLocked: locked, min, max, trump: "" };
        document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.innerText.includes(name)));
        document.getElementById('omiTrumpBox').classList.toggle('hidden', name !== 'Omi');
        updateUI();
    }

    function updatePlayers(val) {
        if(gameConfig.isLocked) return;
        let t = gameConfig.players + val;
        if(t >= gameConfig.min && t <= gameConfig.max) { gameConfig.players = t; updateUI(); }
    }

    function setTrump(val, el) {
        gameConfig.trump = val;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        updateUI();
    }

    function updateUI() {
        document.getElementById('playerVal').innerText = gameConfig.players;
        document.getElementById('mBtn').disabled = gameConfig.isLocked;
        document.getElementById('pBtn').disabled = gameConfig.isLocked;
        
        let preview = `${gameConfig.name || '---'} | ${gameConfig.players} Players`;
        if(gameConfig.trump) preview += ` | Trump: ${gameConfig.trump}`;
        document.getElementById('liveStatus').innerText = preview;
    }

    function launchGame() {
        if(!gameConfig.name) return alert("Select a game!");
        if(gameConfig.name === "Omi" && !gameConfig.trump) return alert("Pick Trump!");

        fetch(`http://${deviceIP}/start_game?game=${gameConfig.name}&players=${gameConfig.players}&trump=${gameConfig.trump}`, { mode: 'no-cors' });
        alert(`Sequence Started: ${gameConfig.name}`);
    }

    function resetSelection() {
        gameConfig = { name: "", players: 4, isLocked: true, min: 2, max: 4, trump: "" };
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('omiTrumpBox').classList.add('hidden');
        updateUI();
    }

    function disconnectWiFi() {
        if(confirm("Confirm Disconnect? Hardware OLED will restart for new setup.")) {
            fetch(`http://${deviceIP}/reset_wifi`, { mode: 'no-cors' });
            setTimeout(() => location.reload(), 1000);
        }
    }
</script>
</body>
</html>
