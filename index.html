<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Game Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0b0e14; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 1.2rem; letter-spacing: 4px; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="authView">
            <h1>Device Login</h1>
            <p style="color: #94a3b8">Enter the 8-digit code from your OLED screen</p>
            <input type="text" id="code" placeholder="00000000" maxlength="8">
            <button class="btn-primary" onclick="connect()">CONNECT SYSTEM</button>
        </div>

        <div id="controlView" class="hidden">
            <h2 id="deviceStatus">Connected</h2>
            <div style="display: grid; gap: 10px;">
                <button style="background: #10b981; color: white;" onclick="hardwareCmd('/led/on')">LED ON</button>
                <button style="background: #ef4444; color: white;" onclick="hardwareCmd('/led/off')">LED OFF</button>
                <button style="background: #f59e0b; color: white; margin-top: 20px;" onclick="hardwareCmd('/reset_wifi')">RESET WIFI</button>
            </div>
        </div>
    </div>

    <script>
        let espIP = "";

        async function connect() {
            const code = document.getElementById('code').value;
            try {
                // 1. Ask Vercel API for the Local IP
                const res = await fetch(`/api/lookup?code=${code}`);
                const data = await res.json();
                
                if (data.ip) {
                    espIP = data.ip;
                    document.getElementById('authView').classList.add('hidden');
                    document.getElementById('controlView').classList.remove('hidden');
                    document.getElementById('deviceStatus').innerText = `Linked: ${espIP}`;
                }
            } catch (e) { alert("Device not found. Check the code on OLED."); }
        }

        function hardwareCmd(path) {
            // Talk directly to the ESP32 on the local network
            fetch(`http://${espIP}${path}`, { mode: 'no-cors' })
                .catch(() => alert("Hardware unreachable. Ensure you are on the same Wi-Fi."));
        }
    </script>
</body>
</html>
